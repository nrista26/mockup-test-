<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
</head>

<body>

    <h1>Contact Us</h1>

    <a href="index.html">Home</a> |
    <a href="contact.html">Contact</a>

    <hr>

    <h2>Contact Information</h2>

    <table border="1">
        <tr>
            <th>Department</th>
            <th>Email</th>
            <th>Phone</th>
        </tr>

        <tr>
            <td>Support</td>
            <td>support@example.com</td>
            <td>123-456-7890</td>
        </tr>

        <tr>
            <td>Sales</td>
            <td>sales@example.com</td>
            <td>987-654-3210</td>
        </tr>

        <tr>
            <td>General Inquiry</td>
            <td>info@example.com</td>
            <td>555-555-5555</td>
        </tr>
    </table>

    <hr>

    <h3><i>Please fill out the form below.</i></h3>

    <form>

        <p>
            <b>Name:</b>
            <input type="text">
        </p>

        <p>
            <b>Email:</b>
            <input type="email">
        </p>

        <p>
            <b>Phone:</b>
            <input type="text">
        </p>

        <p>
            <b>Message:</b><br>
            <textarea rows="5" cols="40"></textarea>
        </p>

        <p>
            <b>Favorite Topic:</b>

            <input type="radio" name="topic"> HTML
            <input type="radio" name="topic"> CSS
            <input type="radio" name="topic"> JavaScript
        </p>

        <hr>

        <input type="submit" value="Send">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
